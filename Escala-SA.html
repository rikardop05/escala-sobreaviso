<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala de Sobreaviso</title>
  <link rel="stylesheet" href="libs/tailwind.min.css">
  <style>body { margin: 0; }</style>
</head>
<body>
  <div id="root"></div>
  <script src="libs/react.production.min.js"></script>
  <script src="libs/react-dom.production.min.js"></script>
  <script src="libs/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ─────────────────────────────────────────────────────────────
    // CONSTANTES GLOBAIS
    // ─────────────────────────────────────────────────────────────

    const PEOPLE = {
      Emanoel:        { color: "#7B1FA2", bg: "#F3E5F5" },
      "Marcus Túlio": { color: "#2E7D32", bg: "#E8F5E9" },
      Ricardo:        { color: "#1565C0", bg: "#E3F2FD" },
      Carlos:         { color: "#37474F", bg: "#ECEFF1" },
      Raul:           { color: "#E65100", bg: "#FFF3E0" },
      Alice:          { color: "#AD1457", bg: "#FCE4EC" },
    };

    // Equipe do Controle de Horas (Alice não participa do controle financeiro)
    const CH_NAMES = ["Raul", "Emanoel", "Marcus Túlio", "Ricardo", "Carlos"];

    const DOW        = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
    const DOW_SHORT  = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    const MONTHS     = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const MONTHS_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

    // ─────────────────────────────────────────────────────────────
    // HELPERS GLOBAIS
    // ─────────────────────────────────────────────────────────────

    // Calcula duração em horas decimais, tratando virada de meia-noite
    function durationHours(inicio, fim) {
      if (!inicio || !fim) return 0;
      const [hi, mi] = inicio.split(":").map(Number);
      const [hf, mf] = fim.split(":").map(Number);
      let start = hi * 60 + mi;
      let end   = hf * 60 + mf;
      if (end <= start) end += 24 * 60;
      return (end - start) / 60;
    }

    function fmtHM(hoursDecimal) {
      const totalMin = Math.round(hoursDecimal * 60);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return `${h}:${String(m).padStart(2, "0")}`;
    }

    const brl = (v) => v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

    // ─────────────────────────────────────────────────────────────
    // CONTROLE DE HORAS — localStorage
    // ─────────────────────────────────────────────────────────────

    const LS_ENTRIES = "controle_horas_entries_v1";
    const LS_PARAMS  = "controle_horas_params_v1";
    const LS_DARK    = "escala_dark_v1";

    function loadEntries() { try { return JSON.parse(localStorage.getItem(LS_ENTRIES)) || []; } catch { return []; } }
    function saveEntries(e) { try { localStorage.setItem(LS_ENTRIES, JSON.stringify(e)); } catch(err) { console.error(err); } }
    function loadParams()   { try { return JSON.parse(localStorage.getItem(LS_PARAMS))  || {}; } catch { return {}; } }
    function saveParams(p)  { try { localStorage.setItem(LS_PARAMS, JSON.stringify(p)); } catch(err) { console.error(err); } }

    // Lê preferência de tema: padrão escuro (true) se nunca foi salvo
    function loadDark() {
      try {
        const v = localStorage.getItem(LS_DARK);
        return v === null ? true : JSON.parse(v);
      } catch { return true; }
    }

    const TYPES = ["Sobreaviso", "Hora Extra", "Compensação"];
    const TYPE_META = {
      Sobreaviso:   { color: "#60A5FA", bg: "#1E3A5F", lightColor: "#1565C0", lightBg: "#E3F2FD" },
      "Hora Extra": { color: "#F472B6", bg: "#4A1025", lightColor: "#C2185B", lightBg: "#FCE4EC" },
      Compensação:  { color: "#FCD34D", bg: "#431407", lightColor: "#854D0E", lightBg: "#FEF9C3" },
    };

    // ─────────────────────────────────────────────────────────────
    // DADOS DA ESCALA
    // ─────────────────────────────────────────────────────────────

    const WEEKDAY_SHIFTS = {
      1: [
        { period: "Madrugada", time: "23:00 – 04:00", dur: "5h", person: "Raul" },
        { period: "Manhã",     time: "04:00 – 09:00", dur: "5h", person: "Emanoel" },
        { period: "Noite",     time: "18:00 – 23:00", dur: "5h", person: "Marcus Túlio" },
      ],
      2: [
        { period: "Madrugada", time: "23:00 – 04:00", dur: "5h", person: "Ricardo" },
        { period: "Manhã",     time: "04:00 – 09:00", dur: "5h", person: "Carlos" },
        { period: "Noite",     time: "18:00 – 23:00", dur: "5h", person: "Raul" },
      ],
      3: [
        { period: "Madrugada", time: "23:00 – 04:00", dur: "5h", person: "Marcus Túlio" },
        { period: "Manhã",     time: "04:00 – 09:00", dur: "5h", person: "Emanoel" },
        { period: "Noite",     time: "18:00 – 23:00", dur: "5h", person: "Raul" },
      ],
      4: [
        { period: "Madrugada", time: "23:00 – 04:00", dur: "5h", person: "Ricardo" },
        { period: "Manhã",     time: "04:00 – 09:00", dur: "5h", person: "Marcus Túlio" },
        { period: "Noite",     time: "18:00 – 23:00", dur: "5h", person: "Carlos" },
      ],
      5: [
        { period: "Madrugada", time: "23:00 – 04:00", dur: "5h", person: "Emanoel" },
        { period: "Manhã",     time: "04:00 – 09:00", dur: "5h", person: "Raul" },
        { period: "Noite",     time: "18:00 – 24:00", dur: "6h", person: "Ricardo" },
      ],
    };

    const WEEKEND_CYCLE = [
      { sabDia: "Carlos",       sabNoite: "Emanoel",      domDia: "Ricardo",      domNoite: "Raul",         folga: "Marcus Túlio" },
      { sabDia: "Marcus Túlio", sabNoite: "Carlos",       domDia: "Emanoel",      domNoite: "Ricardo",      folga: "Raul" },
      { sabDia: "Raul",         sabNoite: "Marcus Túlio", domDia: "Carlos",       domNoite: "Emanoel",      folga: "Ricardo" },
      { sabDia: "Ricardo",      sabNoite: "Raul",         domDia: "Marcus Túlio", domNoite: "Carlos",       folga: "Emanoel" },
      { sabDia: "Emanoel",      sabNoite: "Ricardo",      domDia: "Raul",         domNoite: "Marcus Túlio", folga: "Carlos" },
    ];

    const ANCHOR      = new Date(2026, 5, 13);
    const RANGE_START = new Date(2026, 5, 8);
    const RANGE_END   = new Date(2027, 5, 30);

    // ─────────────────────────────────────────────────────────────
    // LÓGICA DE ESCALA
    // ─────────────────────────────────────────────────────────────

    const MS_DAY = 86400000;
    const dayKey  = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const sameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    const fmtDS   = (str) => str ? `${str.slice(8)}/${str.slice(5,7)}` : "";

    function cycleIndex(saturday) {
      const diff = Math.round((saturday.getTime() - ANCHOR.getTime()) / (7 * MS_DAY));
      return ((diff % 5) + 5) % 5;
    }

    function buildSchedule() {
      const days = [];
      for (let t = RANGE_START.getTime(); t <= RANGE_END.getTime(); t += MS_DAY) {
        const d = new Date(t);
        d.setHours(12, 0, 0, 0);
        const dow = d.getDay();
        let shifts = [], folga = null, cycleWeek = null;
        if (dow >= 1 && dow <= 5) {
          shifts = WEEKDAY_SHIFTS[dow].map(s => ({ ...s }));
        } else {
          const sat = dow === 6 ? d : new Date(d.getTime() - MS_DAY);
          const idx = cycleIndex(sat);
          const rot = WEEKEND_CYCLE[idx];
          cycleWeek = idx + 1;
          folga = rot.folga;
          shifts = dow === 6
            ? [{ period:"Dia",  time:"00:00 – 12:00", dur:"12h", person: rot.sabDia   },
               { period:"Noite",time:"12:00 – 00:00", dur:"12h", person: rot.sabNoite }]
            : [{ period:"Dia",  time:"00:00 – 12:00", dur:"12h", person: rot.domDia   },
               { period:"Noite",time:"12:00 – 00:00", dur:"12h", person: rot.domNoite }];
        }
        days.push({ date: new Date(d), dow, shifts, folga, cycleWeek });
      }
      return days;
    }

    function currentOnCall(now) {
      const dow = now.getDay();
      const h   = now.getHours() + now.getMinutes() / 60;
      const weekendOf = (d) => WEEKEND_CYCLE[cycleIndex(d.getDay()===6 ? d : new Date(d.getTime()-MS_DAY))];
      if (dow === 6) {
        const rot = weekendOf(now);
        return h < 12
          ? { person: rot.sabDia,   label: "Sábado · Dia",   time: "00:00 – 12:00" }
          : { person: rot.sabNoite, label: "Sábado · Noite", time: "12:00 – 00:00" };
      }
      if (dow === 0) {
        const rot = weekendOf(now);
        return h < 12
          ? { person: rot.domDia,   label: "Domingo · Dia",   time: "00:00 – 12:00" }
          : { person: rot.domNoite, label: "Domingo · Noite", time: "12:00 – 00:00" };
      }
      const today = WEEKDAY_SHIFTS[dow];
      if (h < 4)   return { person: today[0].person, label: `${DOW[dow]} · Madrugada`, time: today[0].time };
      if (h < 9)   return { person: today[1].person, label: `${DOW[dow]} · Manhã`,     time: today[1].time };
      if (h >= 18) {
        if (dow === 5) return { person: today[2].person, label: "Sexta · Noite", time: today[2].time };
        if (h < 23)   return { person: today[2].person, label: `${DOW[dow]} · Noite`, time: today[2].time };
        const next = WEEKDAY_SHIFTS[dow + 1];
        return { person: next[0].person, label: `${DOW[dow+1]} · Madrugada`, time: next[0].time };
      }
      return null;
    }

    // ─────────────────────────────────────────────────────────────
    // LÓGICA DE SUBSTITUIÇÕES
    // ─────────────────────────────────────────────────────────────

    function getActiveSub(person, dateStr, subs) {
      return subs.find(s => s.titular === person && dateStr >= s.from && dateStr <= s.until) || null;
    }

    function getCoverSuggestions(titular, fromStr, untilStr, schedule) {
      return schedule
        .filter(d => {
          const k = dayKey(d.date);
          return k >= fromStr && k <= untilStr && d.shifts.some(s => s.person === titular);
        })
        .map(d => {
          const busy = new Set(d.shifts.map(s => s.person));
          const available = Object.keys(PEOPLE).filter(p => p !== titular && !busy.has(p));
          return { date: d.date, dow: d.dow, shifts: d.shifts.filter(s => s.person === titular), available };
        });
    }

    // ─────────────────────────────────────────────────────────────
    // COMPONENTE COMPARTILHADO
    // ─────────────────────────────────────────────────────────────

    function PersonTag({ name, dim, subOf }) {
      const p = PEOPLE[name] || { color: "#555", bg: "#eee" };
      return (
        <span
          className="inline-flex items-center gap-1.5 rounded-md px-2 py-0.5 text-sm font-bold"
          style={{ color: p.color, background: dim ? "transparent" : p.bg, opacity: dim ? 0.3 : 1 }}
        >
          <span className="w-2 h-2 rounded-full" style={{ background: p.color }} />
          {name}
          {subOf && (
            <span style={{ fontSize:"0.6rem", fontWeight:"700", background:"rgba(0,0,0,0.12)", borderRadius:"3px", padding:"0 3px", letterSpacing:"0.03em" }}>
              sub
            </span>
          )}
        </span>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // CONTROLE DE HORAS — COMPONENTE
    // ─────────────────────────────────────────────────────────────

    function ControleDeHoras({ dark }) {
      const now = new Date();
      const [entries, setEntries] = useState(loadEntries);
      const [paramsByPerson, setParamsByPerson] = useState(loadParams);
      const [person, setPerson] = useState(CH_NAMES[0]);
      const [monthIdx, setMonthIdx] = useState(now.getMonth());
      const [year, setYear] = useState(now.getFullYear());

      const blank = { tipo: "Hora Extra", data: "", inicio: "", fim: "", projeto: "", atividade: "" };
      const [form, setForm] = useState(blank);
      const [editId, setEditId] = useState(null);

      useEffect(() => saveEntries(entries), [entries]);
      useEffect(() => saveParams(paramsByPerson), [paramsByPerson]);

      // ── Tema ──────────────────────────────────────────────────
      const CT = dark ? {
        pageBg:      "#0F172A",
        cardBg:      "#1E293B",
        cardBorder:  "#334155",
        text:        "#F1F5F9",
        textLabel:   "#64748B",
        textMuted:   "#475569",
        textStrong:  "#CBD5E1",
        textMid:     "#94A3B8",
        inputBg:     "#0F172A",
        inputBorder: "#334155",
        divider:     "#263347",
        rowEditBg:   "#162032",
        saveBg:      "#F1F5F9",
        saveColor:   "#0F172A",
        cancelBg:    "#1E293B",
        cancelColor: "#94A3B8",
        cancelBorder:"#334155",
        footerText:  "#334155",
        exportBg:    "#166534",
      } : {
        pageBg:      "#EEF1F6",
        cardBg:      "#fff",
        cardBorder:  "#E2E8F0",
        text:        "#1E293B",
        textLabel:   "#64748B",
        textMuted:   "#94A3B8",
        textStrong:  "#374151",
        textMid:     "#4B5563",
        inputBg:     "#fff",
        inputBorder: "#CBD5E1",
        divider:     "#F1F5F9",
        rowEditBg:   "#F8FAFC",
        saveBg:      "#1E293B",
        saveColor:   "#fff",
        cancelBg:    "#fff",
        cancelColor: "#475569",
        cancelBorder:"#CBD5E1",
        footerText:  "#94A3B8",
        exportBg:    "#2E7D32",
      };

      const inputStyle = {
        background: CT.inputBg,
        color: CT.text,
        border: `1px solid ${CT.inputBorder}`,
        borderRadius: "0.5rem",
        padding: "0.35rem 0.6rem",
        fontSize: "0.875rem",
        outline: "none",
        width: "100%",
        transition: "border-color 0.15s",
      };

      const params = paramsByPerson[person] || { remuneracao: 4000, jornada: 168 };
      const valorHora = params.remuneracao / params.jornada;

      const setParam = (field, value) => {
        setParamsByPerson((prev) => ({
          ...prev,
          [person]: { ...params, [field]: value },
        }));
      };

      const monthEntries = useMemo(() => {
        return entries
          .filter((e) => {
            if (e.person !== person) return false;
            const d = new Date(e.data + "T12:00:00");
            return d.getMonth() === monthIdx && d.getFullYear() === year;
          })
          .sort((a, b) => (a.data + a.inicio).localeCompare(b.data + b.inicio));
      }, [entries, person, monthIdx, year]);

      const totals = useMemo(() => {
        let sobreaviso = 0, extra = 0, comp = 0;
        monthEntries.forEach((e) => {
          const h = durationHours(e.inicio, e.fim);
          if (e.tipo === "Sobreaviso")      sobreaviso += h;
          else if (e.tipo === "Hora Extra")  extra += h;
          else if (e.tipo === "Compensação") comp += h;
        });
        const valorSobreaviso = (valorHora / 3) * sobreaviso;
        const valorExtra = valorHora * 1.5 * extra;
        return {
          sobreaviso, extra, comp,
          totalHoras: sobreaviso + extra + comp,
          valorSobreaviso,
          valorExtra,
          valorTotal: valorSobreaviso + valorExtra,
        };
      }, [monthEntries, valorHora]);

      const submit = () => {
        if (!form.data || !form.inicio || !form.fim) return;
        if (editId) {
          setEntries((prev) => prev.map((e) => (e.id === editId ? { ...e, ...form, person } : e)));
          setEditId(null);
        } else {
          setEntries((prev) => [...prev, { id: crypto.randomUUID(), person, ...form }]);
        }
        setForm(blank);
      };

      const startEdit = (e) => {
        setForm({ tipo: e.tipo, data: e.data, inicio: e.inicio, fim: e.fim, projeto: e.projeto || "", atividade: e.atividade || "" });
        setEditId(e.id);
      };

      const remove = (id) => {
        setEntries((prev) => prev.filter((e) => e.id !== id));
        if (editId === id) { setEditId(null); setForm(blank); }
      };

      const exportCSV = () => {
        const sep = ";";
        const header = ["Data", "Tipo", "Início", "Fim", "Duração (h)", "Duração (h:mm)", "Projeto", "Atividade / Descrição", "Responsável"];
        const rows = monthEntries.map((e) => {
          const h = durationHours(e.inicio, e.fim);
          return [
            e.data, e.tipo, e.inicio, e.fim,
            h.toFixed(2).replace(".", ","),
            fmtHM(h),
            e.projeto || "",
            (e.atividade || "").replace(/"/g, '""'),
            e.person,
          ];
        });
        const summary = [
          [],
          ["RESUMO", `${MONTHS[monthIdx]} ${year}`, person],
          ["Remuneração mensal", brl(params.remuneracao)],
          ["Jornada (h)", String(params.jornada)],
          ["Valor hora", brl(valorHora)],
          ["Horas sobreaviso", fmtHM(totals.sobreaviso)],
          ["Horas extra", fmtHM(totals.extra)],
          ["Horas compensação", fmtHM(totals.comp)],
          ["Valor sobreaviso (÷3)", brl(totals.valorSobreaviso)],
          ["Valor hora extra (×1,5)", brl(totals.valorExtra)],
          ["VALOR TOTAL", brl(totals.valorTotal)],
        ];
        const all = [header, ...rows, ...summary];
        const csv = "﻿" + all.map((r) => r.map((c) => `"${String(c)}"`).join(sep)).join("\r\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `controle-horas_${person.replace(/\s/g, "-")}_${MONTHS[monthIdx]}-${year}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const p = PEOPLE[person];
      const years = [year - 1, year, year + 1];
      const liveDuration = durationHours(form.inicio, form.fim);
      const canSubmit = !!(form.data && form.inicio && form.fim);

      return (
        <div style={{ minHeight: "100vh", background: CT.pageBg, fontFamily: "'Segoe UI', system-ui, sans-serif", color: CT.text, transition: "background 0.2s, color 0.2s" }}>
          <div className="max-w-3xl mx-auto px-4 py-6">

            {/* CABEÇALHO */}
            <div className="rounded-2xl p-5 mb-5 text-white" style={{ background: "linear-gradient(135deg, #1E293B 0%, #334155 100%)" }}>
              <div className="text-xs uppercase tracking-widest opacity-60 mb-1">Controle de Horas</div>
              <div className="text-2xl font-bold">{MONTHS[monthIdx]} de {year}</div>
              <div className="text-sm opacity-70 mt-1">Sobreaviso, horas extra e compensação por responsável</div>
            </div>

            {/* SELETORES */}
            <div className="flex flex-wrap gap-3 mb-4 items-end">
              <div>
                <div className="text-xs font-bold uppercase tracking-wider mb-1" style={{ color: CT.textLabel }}>Responsável</div>
                <div className="flex flex-wrap gap-2">
                  {CH_NAMES.map((n) => (
                    <button key={n} onClick={() => setPerson(n)}
                      className="px-3 py-1.5 rounded-full text-sm font-bold transition-all"
                      style={{ background: person === n ? PEOPLE[n].color : CT.cardBg, color: person === n ? "#fff" : PEOPLE[n].color, border: `1.5px solid ${person === n ? PEOPLE[n].color : CT.cardBorder}` }}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div className="text-xs font-bold uppercase tracking-wider mb-1" style={{ color: CT.textLabel }}>Mês</div>
                <select style={inputStyle} value={monthIdx} onChange={(e) => setMonthIdx(Number(e.target.value))}>
                  {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                </select>
              </div>
              <div>
                <div className="text-xs font-bold uppercase tracking-wider mb-1" style={{ color: CT.textLabel }}>Ano</div>
                <select style={{ ...inputStyle, width: "auto" }} value={year} onChange={(e) => setYear(Number(e.target.value))}>
                  {years.map((y) => <option key={y} value={y}>{y}</option>)}
                </select>
              </div>
            </div>

            {/* PARÂMETROS EDITÁVEIS */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: CT.cardBg, border: `1px solid ${CT.cardBorder}` }}>
              <div className="text-xs font-bold uppercase tracking-wider mb-3" style={{ color: CT.textLabel }}>Parâmetros de {person}</div>
              <div className="flex flex-wrap gap-4 items-end">
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Remuneração mensal (R$)</div>
                  <input type="number" style={{ ...inputStyle, width: "9rem" }} value={params.remuneracao}
                    onChange={(e) => setParam("remuneracao", Number(e.target.value))} />
                </div>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Jornada (h)</div>
                  <input type="number" style={{ ...inputStyle, width: "6rem" }} value={params.jornada}
                    onChange={(e) => setParam("jornada", Number(e.target.value))} />
                </div>
                <div className="ml-auto text-right">
                  <div className="text-xs" style={{ color: CT.textLabel }}>Valor hora</div>
                  <div className="text-lg font-bold" style={{ color: p.color }}>{brl(valorHora)}</div>
                </div>
              </div>
            </div>

            {/* FORMULÁRIO DE LANÇAMENTO */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: CT.cardBg, border: `1px solid ${CT.cardBorder}` }}>
              <div className="text-xs font-bold uppercase tracking-wider mb-3" style={{ color: CT.textLabel }}>
                {editId ? "Editar lançamento" : "Novo lançamento"}
              </div>
              <div className="grid grid-cols-2 gap-3 mb-3" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))" }}>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Tipo</div>
                  <select style={inputStyle} value={form.tipo} onChange={(e) => setForm({ ...form, tipo: e.target.value })}>
                    {TYPES.map((t) => <option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Data</div>
                  <input type="date" style={inputStyle} value={form.data} onChange={(e) => setForm({ ...form, data: e.target.value })} />
                </div>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Início</div>
                  <input type="time" style={inputStyle} value={form.inicio} onChange={(e) => setForm({ ...form, inicio: e.target.value })} />
                </div>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Fim</div>
                  <input type="time" style={inputStyle} value={form.fim} onChange={(e) => setForm({ ...form, fim: e.target.value })} />
                </div>
              </div>
              <div className="grid grid-cols-1 gap-3 mb-3" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))" }}>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Projeto</div>
                  <input type="text" style={inputStyle} placeholder="Ex.: CorpX, AICE…" value={form.projeto} onChange={(e) => setForm({ ...form, projeto: e.target.value })} />
                </div>
                <div>
                  <div className="text-xs mb-1" style={{ color: CT.textLabel }}>Atividade / Descrição (sai no relatório)</div>
                  <input type="text" style={inputStyle} placeholder="O que foi feito" value={form.atividade} onChange={(e) => setForm({ ...form, atividade: e.target.value })} />
                </div>
              </div>
              <div className="flex items-center gap-3 flex-wrap">
                <button onClick={submit}
                  style={{ background: canSubmit ? CT.saveBg : CT.cardBorder, color: canSubmit ? CT.saveColor : CT.textMuted, border: "none", borderRadius: "0.5rem", padding: "0.45rem 1.1rem", fontWeight: "700", fontSize: "0.875rem", cursor: canSubmit ? "pointer" : "not-allowed", transition: "background 0.15s" }}>
                  {editId ? "Salvar alterações" : "Adicionar lançamento"}
                </button>
                {editId && (
                  <button onClick={() => { setEditId(null); setForm(blank); }}
                    style={{ background: CT.cancelBg, color: CT.cancelColor, border: `1px solid ${CT.cancelBorder}`, borderRadius: "0.5rem", padding: "0.45rem 1.1rem", fontWeight: "700", fontSize: "0.875rem", cursor: "pointer" }}>
                    Cancelar
                  </button>
                )}
                {form.inicio && form.fim && (
                  <span className="text-sm" style={{ color: CT.textLabel }}>
                    Duração: <b style={{ color: CT.text }}>{fmtHM(liveDuration)}</b>
                  </span>
                )}
              </div>
            </div>

            {/* RELATÓRIO / RESUMO */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: CT.cardBg, border: `1px solid ${CT.cardBorder}` }}>
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs font-bold uppercase tracking-wider" style={{ color: CT.textLabel }}>Relatório do mês</div>
                <button onClick={exportCSV} disabled={monthEntries.length === 0}
                  style={{ background: monthEntries.length > 0 ? CT.exportBg : CT.cardBorder, color: monthEntries.length > 0 ? "#fff" : CT.textMuted, border: "none", borderRadius: "0.5rem", padding: "0.35rem 0.9rem", fontWeight: "700", fontSize: "0.875rem", cursor: monthEntries.length > 0 ? "pointer" : "not-allowed" }}>
                  ↓ Exportar CSV
                </button>
              </div>
              <div className="grid gap-3" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))" }}>
                {[
                  { label: "Sobreaviso",  h: totals.sobreaviso, v: totals.valorSobreaviso, tm: TYPE_META.Sobreaviso },
                  { label: "Hora Extra",  h: totals.extra,      v: totals.valorExtra,      tm: TYPE_META["Hora Extra"] },
                  { label: "Compensação", h: totals.comp,       v: null,                   tm: TYPE_META.Compensação },
                ].map((b) => {
                  const bg    = dark ? b.tm.bg    : b.tm.lightBg;
                  const color = dark ? b.tm.color : b.tm.lightColor;
                  return (
                    <div key={b.label} className="rounded-xl p-3" style={{ background: bg }}>
                      <div className="text-xs font-bold uppercase tracking-wide" style={{ color }}>{b.label}</div>
                      <div className="text-xl font-bold" style={{ color: dark ? "#F1F5F9" : "#1E293B" }}>{fmtHM(b.h)}</div>
                      {b.v !== null && <div className="text-sm font-semibold" style={{ color }}>{brl(b.v)}</div>}
                    </div>
                  );
                })}
              </div>
              <div className="mt-3 pt-3 flex items-center justify-between" style={{ borderTop: `1px solid ${CT.cardBorder}` }}>
                <span className="text-sm" style={{ color: CT.textLabel }}>Total de horas: <b style={{ color: CT.text }}>{fmtHM(totals.totalHoras)}</b></span>
                <div className="text-right">
                  <div className="text-xs uppercase tracking-wide" style={{ color: CT.textLabel }}>Valor total a receber</div>
                  <div className="text-2xl font-bold" style={{ color: p.color }}>{brl(totals.valorTotal)}</div>
                </div>
              </div>
            </div>

            {/* TABELA DE LANÇAMENTOS */}
            <div className="rounded-2xl overflow-hidden" style={{ border: `1px solid ${CT.cardBorder}` }}>
              <div className="px-4 py-3 text-xs font-bold uppercase tracking-wider" style={{ color: CT.textLabel, background: CT.cardBg, borderBottom: `1px solid ${CT.cardBorder}` }}>
                Lançamentos ({monthEntries.length})
              </div>
              {monthEntries.length === 0 ? (
                <div className="px-4 py-8 text-center text-sm" style={{ color: CT.textMuted, background: CT.cardBg }}>
                  Nenhum lançamento neste mês. Adicione horas acima.
                </div>
              ) : (
                <div style={{ background: CT.cardBg }}>
                  {monthEntries.map((e, i) => {
                    const h = durationHours(e.inicio, e.fim);
                    const tm = TYPE_META[e.tipo];
                    const tagBg    = dark ? tm.bg    : tm.lightBg;
                    const tagColor = dark ? tm.color : tm.lightColor;
                    return (
                      <div key={e.id} className="px-4 py-2.5 flex items-center gap-3 text-sm"
                        style={{ borderTop: i > 0 ? `1px solid ${CT.divider}` : "none", background: editId === e.id ? CT.rowEditBg : "transparent" }}>
                        <div className="font-mono font-bold w-14 shrink-0" style={{ color: CT.textStrong }}>
                          {e.data.slice(8, 10)}/{e.data.slice(5, 7)}
                        </div>
                        <span className="rounded-md px-2 py-0.5 text-xs font-bold shrink-0" style={{ background: tagBg, color: tagColor }}>{e.tipo}</span>
                        <span className="font-mono text-xs shrink-0 w-24" style={{ color: CT.textLabel }}>{e.inicio}–{e.fim}</span>
                        <span className="font-mono text-xs font-bold shrink-0 w-12" style={{ color: CT.textStrong }}>{fmtHM(h)}</span>
                        <span className="flex-1 truncate" style={{ color: CT.textMid }}>
                          {e.projeto && <b style={{ color: CT.textStrong }}>{e.projeto}: </b>}{e.atividade}
                        </span>
                        <button onClick={() => startEdit(e)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "0.75rem", color: CT.textLabel, flexShrink: 0 }}>editar</button>
                        <button onClick={() => remove(e.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "0.75rem", color: "#F87171", flexShrink: 0 }}>excluir</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div className="mt-6 text-center text-xs" style={{ color: CT.footerText }}>
              Sobreaviso pago a 1/3 do valor-hora · Hora extra a 1,5× · Dados salvos localmente no navegador
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // ESCALA DE SOBREAVISO — COMPONENTE
    // ─────────────────────────────────────────────────────────────

    function EscalaSobreaviso({ dark, onToggleDark }) {
      const [now,      setNow]      = useState(new Date());
      const [filter,   setFilter]   = useState(null);
      const [monthKey, setMonthKey] = useState(null);

      const [subs,    setSubs]    = useState([]);
      const [subForm, setSubForm] = useState({ show: false, titular: "", substituto: "", from: "", until: "" });

      // ── Tema ──────────────────────────────────────────────────
      const T = dark ? {
        pageBg:"#0F172A", cardBg:"#1E293B", cardBgWeekend:"#1A2336",
        cardBorder:"#334155", cardBorderToday:"#94A3B8",
        headerGrad:"linear-gradient(135deg,#020617 0%,#0F172A 100%)",
        dateColBg:"#162032", dateColBgWeekend:"#1C2840", dateColBorder:"#334155",
        upcomingBg:"#1E293B", upcomingBorder:"#334155", upcomingDivider:"#263347",
        cycleBg:"#334155", cycleColor:"#94A3B8",
        labelColor:"#475569", textPrimary:"#F1F5F9", textSecondary:"#94A3B8", textMuted:"#64748B",
        periodColor:"#94A3B8", timeColor:"#64748B", durColor:"#475569",
        dateNumColor:"#CBD5E1", monthShortColor:"#475569",
        filterAllBg:"#F1F5F9", filterAllColor:"#0F172A", filterAllBorder:"#F1F5F9",
        filterDefBg:"#1E293B", filterDefColor:"#64748B", filterDefBorder:"#334155",
        monthActiveBg:"#F1F5F9", monthActiveColor:"#0F172A", monthActiveBorder:"#F1F5F9",
        monthDefBg:"#1E293B", monthDefColor:"#64748B", monthDefBorder:"#334155",
        inputBg:"#0F172A", saveBg:"#F1F5F9", saveColor:"#0F172A",
      } : {
        pageBg:"#EEF1F6", cardBg:"#fff", cardBgWeekend:"#FDFBEF",
        cardBorder:"#E2E8F0", cardBorderToday:"#1E293B",
        headerGrad:"linear-gradient(135deg,#1E293B 0%,#334155 100%)",
        dateColBg:"#F1F5F9", dateColBgWeekend:"#F5EFD0", dateColBorder:"#E2E8F0",
        upcomingBg:"#fff", upcomingBorder:"#E2E8F0", upcomingDivider:"#F1F5F9",
        cycleBg:"#E2E8F0", cycleColor:"#475569",
        labelColor:"#64748B", textPrimary:"#1E293B", textSecondary:"#475569", textMuted:"#94A3B8",
        periodColor:"#475569", timeColor:"#94A3B8", durColor:"#94A3B8",
        dateNumColor:"#1E293B", monthShortColor:"#94A3B8",
        filterAllBg:"#1E293B", filterAllColor:"#fff", filterAllBorder:"#1E293B",
        filterDefBg:"#fff", filterDefColor:"#475569", filterDefBorder:"#CBD5E1",
        monthActiveBg:"#1E293B", monthActiveColor:"#fff", monthActiveBorder:"#1E293B",
        monthDefBg:"#fff", monthDefColor:"#475569", monthDefBorder:"#E2E8F0",
        inputBg:"#fff", saveBg:"#1E293B", saveColor:"#fff",
      };

      const selStyle = {
        display:"block", width:"100%", padding:"0.35rem 0.5rem", fontSize:"0.8rem",
        borderRadius:"0.4rem", border:`1px solid ${T.cardBorder}`,
        background:T.inputBg, color:T.textPrimary, marginTop:"0.25rem", outline:"none",
      };

      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 60000);
        return () => clearInterval(id);
      }, []);

      const schedule = useMemo(() => buildSchedule(), []);
      const todayStr = dayKey(now);

      const months = useMemo(() => {
        const seen = new Map();
        schedule.forEach(d => {
          const k = `${d.date.getFullYear()}-${d.date.getMonth()}`;
          if (!seen.has(k)) seen.set(k, { key:k, y:d.date.getFullYear(), m:d.date.getMonth() });
        });
        return [...seen.values()];
      }, [schedule]);

      const activeMonth = monthKey || (() => {
        const k = `${now.getFullYear()}-${now.getMonth()}`;
        return months.some(m => m.key === k) ? k : months[0].key;
      })();

      const monthDays = useMemo(
        () => schedule.filter(d => `${d.date.getFullYear()}-${d.date.getMonth()}` === activeMonth),
        [schedule, activeMonth]
      );

      const onCallBase = currentOnCall(now);
      const onCall = onCallBase ? (() => {
        const sub = getActiveSub(onCallBase.person, todayStr, subs);
        return sub ? { ...onCallBase, person: sub.substituto, coveringFor: onCallBase.person } : onCallBase;
      })() : null;
      const onCallColor = onCall ? (PEOPLE[onCall.person] || {}).color || "#94A3B8" : "#94A3B8";

      const coverSuggestions = useMemo(() => {
        if (!subForm.titular || !subForm.from || !subForm.until || subForm.from > subForm.until) return [];
        return getCoverSuggestions(subForm.titular, subForm.from, subForm.until, schedule);
      }, [subForm.titular, subForm.from, subForm.until, schedule]);

      const upcoming = useMemo(() => {
        if (!filter) return [];
        const today = new Date(now); today.setHours(0, 0, 0, 0);
        const rows = [];
        for (const d of schedule) {
          if (d.date < today) continue;
          const dk = dayKey(d.date);
          d.shifts.forEach(s => {
            const sub = getActiveSub(s.person, dk, subs);
            const effective = sub ? sub.substituto : s.person;
            if (s.person === filter) {
              rows.push({ date:d.date, dow:d.dow, ...s, kind:"turno", coveredBy: sub ? sub.substituto : null });
            } else if (effective === filter) {
              rows.push({ date:d.date, dow:d.dow, ...s, person:filter, kind:"turno", coveringFor: s.person });
            }
          });
          if (d.folga === filter && d.dow === 6) {
            const sub = getActiveSub(filter, dk, subs);
            if (!sub) rows.push({ date:d.date, dow:d.dow, period:"Folga FDS", time:"Sáb + Dom", dur:"", person:filter, kind:"folga" });
          }
          if (rows.length >= 30) break;
        }
        rows.sort((a, b) => a.date - b.date);
        return rows.slice(0, 25);
      }, [filter, schedule, now, subs]);

      const activeTitulares = useMemo(
        () => new Set(subs.filter(s => s.from <= todayStr && s.until >= todayStr).map(s => s.titular)),
        [subs, todayStr]
      );

      const canSave = subForm.titular && subForm.substituto && subForm.from && subForm.until
                      && subForm.from <= subForm.until && subForm.titular !== subForm.substituto;

      function openSubForm() {
        setSubForm(f => ({ ...f, show: true, from: f.from || todayStr }));
      }
      function addSub() {
        if (!canSave) return;
        setSubs(prev => [...prev, { id: Date.now(), titular: subForm.titular, substituto: subForm.substituto, from: subForm.from, until: subForm.until }]);
        setSubForm({ show: false, titular: "", substituto: "", from: todayStr, until: "" });
      }
      function removeSub(id) { setSubs(prev => prev.filter(s => s.id !== id)); }

      const fmtDate = (d) => `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
      const am = months.find(m => m.key === activeMonth);

      return (
        <div style={{ minHeight:"100vh", background:T.pageBg, fontFamily:"'Segoe UI',system-ui,sans-serif", color:T.textPrimary, transition:"background 0.2s,color 0.2s" }}>
          <div className="max-w-3xl mx-auto px-4 py-6">

            {/* ── CABEÇALHO ───────────────────────────────────── */}
            <div className="rounded-2xl p-5 mb-5 text-white" style={{ background:T.headerGrad, position:"relative" }}>
              <button
                onClick={onToggleDark}
                style={{ position:"absolute", top:"0.75rem", right:"0.75rem", background:"rgba(255,255,255,0.12)", color:"#fff", border:"1px solid rgba(255,255,255,0.22)", borderRadius:"9999px", padding:"0.2rem 0.65rem", fontSize:"0.7rem", fontWeight:"600", cursor:"pointer", letterSpacing:"0.03em", lineHeight:"1.6" }}
              >
                {dark ? "☀ Claro" : "🌙 Escuro"}
              </button>
              <div className="flex flex-wrap items-start justify-between gap-3">
                <div>
                  <div className="text-xs uppercase tracking-widest opacity-60 mb-1">Escala de Sobreaviso</div>
                  <div className="text-2xl font-bold">{DOW[now.getDay()]}, {fmtDate(now)}/{now.getFullYear()}</div>
                </div>
                <div className="rounded-xl px-4 py-3 min-w-[200px]" style={{ background:"rgba(255,255,255,0.08)", borderLeft:`4px solid ${onCallColor}` }}>
                  <div className="flex items-center gap-2 text-[11px] uppercase tracking-wider opacity-70">
                    <span className="relative flex w-2 h-2">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-60" style={{ background:onCallColor }} />
                      <span className="relative inline-flex rounded-full w-2 h-2" style={{ background:onCallColor }} />
                    </span>
                    Agora
                  </div>
                  {onCall ? (
                    <>
                      <div className="text-lg font-bold" style={{ color: onCallColor === "#37474F" ? "#CBD5E1" : onCallColor }}>{onCall.person}</div>
                      <div className="text-xs opacity-70">
                        {onCall.label} · {onCall.time}
                        {onCall.coveringFor && <span className="ml-1 opacity-80">· cobre {onCall.coveringFor}</span>}
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="text-lg font-bold opacity-90">Sem sobreaviso</div>
                      <div className="text-xs opacity-70">Horário comercial (09:00 – 18:00)</div>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* ── FILTRO ──────────────────────────────────────── */}
            <div className="mb-4">
              <div className="text-xs font-bold uppercase tracking-wider mb-2" style={{ color:T.labelColor }}>Filtrar por responsável</div>
              <div className="flex flex-wrap gap-2">
                <button onClick={() => setFilter(null)} className="px-3 py-1.5 rounded-full text-sm font-bold transition-all"
                  style={{ background:!filter?T.filterAllBg:T.filterDefBg, color:!filter?T.filterAllColor:T.filterDefColor, border:"1.5px solid "+(!filter?T.filterAllBorder:T.filterDefBorder) }}>
                  Todos
                </button>
                {Object.entries(PEOPLE).map(([name, p]) => {
                  const isFeriasHoje = activeTitulares.has(name);
                  return (
                    <button key={name} onClick={() => setFilter(filter===name?null:name)} className="px-3 py-1.5 rounded-full text-sm font-bold transition-all"
                      style={{ background:filter===name?p.color:T.filterDefBg, color:filter===name?"#fff":p.color, border:`1.5px solid ${filter===name?p.color:T.filterDefBorder}` }}>
                      {name}{isFeriasHoje ? " 🌴" : ""}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* ── SUBSTITUIÇÕES ───────────────────────────────── */}
            <div className="rounded-2xl p-4 mb-4" style={{ background:T.cardBg, border:`1px solid ${T.cardBorder}` }}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span className="text-xs font-bold uppercase tracking-wider" style={{ color:T.labelColor }}>Substituições</span>
                  {subs.length > 0 && (
                    <span className="text-[10px] font-bold rounded-full px-2 py-0.5" style={{ background:"#DBEAFE", color:"#1D4ED8" }}>
                      {subs.length} ativa{subs.length > 1 ? "s" : ""}
                    </span>
                  )}
                </div>
                <button
                  onClick={subForm.show ? () => setSubForm(f => ({ ...f, show:false })) : openSubForm}
                  style={{ background:"transparent", border:`1px solid ${T.cardBorder}`, borderRadius:"9999px", padding:"0.2rem 0.65rem", fontSize:"0.72rem", fontWeight:"700", cursor:"pointer", color:T.textSecondary }}
                >
                  {subForm.show ? "Cancelar" : "+ Adicionar"}
                </button>
              </div>

              {subs.length === 0 && !subForm.show && (
                <div className="text-xs" style={{ color:T.textMuted }}>Nenhuma substituição ativa. Use para férias ou trocas eventuais.</div>
              )}
              {subs.map((s, i) => (
                <div key={s.id} className="flex items-center justify-between py-2 flex-wrap gap-y-1"
                  style={{ borderTop: i === 0 && subs.length > 0 ? `1px solid ${T.upcomingDivider}` : i > 0 ? `1px solid ${T.upcomingDivider}` : "none" }}>
                  <div className="flex items-center gap-2 flex-wrap text-sm">
                    <PersonTag name={s.titular} />
                    <span style={{ color:T.textMuted, fontSize:"1rem" }}>→</span>
                    <PersonTag name={s.substituto} />
                    <span className="text-xs font-mono" style={{ color:T.textMuted }}>{fmtDS(s.from)} – {fmtDS(s.until)}</span>
                  </div>
                  <button onClick={() => removeSub(s.id)}
                    style={{ background:"transparent", border:"none", cursor:"pointer", color:T.textMuted, fontSize:"1rem", lineHeight:1, padding:"0 0.25rem" }}>
                    ✕
                  </button>
                </div>
              ))}

              {subForm.show && (
                <div className="mt-3 pt-3" style={{ borderTop:`1px solid ${T.cardBorder}` }}>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-wider" style={{ color:T.labelColor }}>Titular (ausente)</label>
                      <select value={subForm.titular} onChange={e => setSubForm(f => ({ ...f, titular:e.target.value, substituto: f.substituto===e.target.value?"":f.substituto }))} style={selStyle}>
                        <option value="">Selecionar...</option>
                        {Object.keys(PEOPLE).map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-wider" style={{ color:T.labelColor }}>Substituto</label>
                      <select value={subForm.substituto} onChange={e => setSubForm(f => ({ ...f, substituto:e.target.value }))} style={selStyle}>
                        <option value="">Selecionar...</option>
                        {Object.keys(PEOPLE).filter(p => p !== subForm.titular).map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-wider" style={{ color:T.labelColor }}>De</label>
                      <input type="date" value={subForm.from} onChange={e => setSubForm(f => ({ ...f, from:e.target.value }))} style={selStyle} />
                    </div>
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-wider" style={{ color:T.labelColor }}>Até</label>
                      <input type="date" value={subForm.until} onChange={e => setSubForm(f => ({ ...f, until:e.target.value }))} style={selStyle} />
                    </div>
                  </div>

                  <button onClick={addSub} disabled={!canSave}
                    style={{ background:canSave?T.saveBg:T.cardBorder, color:canSave?T.saveColor:T.textMuted, border:"none", borderRadius:"0.5rem", padding:"0.4rem 1.1rem", fontWeight:"700", fontSize:"0.8rem", cursor:canSave?"pointer":"not-allowed", transition:"background 0.15s" }}>
                    Salvar substituição
                  </button>

                  {coverSuggestions.length > 0 && (
                    <div className="mt-4 pt-3" style={{ borderTop:`1px solid ${T.upcomingDivider}` }}>
                      <div className="text-[10px] font-bold uppercase tracking-wider mb-2" style={{ color:T.labelColor }}>
                        {subForm.substituto
                          ? `${subForm.substituto} cobrirá ${coverSuggestions.length} dia${coverSuggestions.length>1?"s":""} de ${subForm.titular || "..."}`
                          : `${coverSuggestions.length} dia${coverSuggestions.length>1?"s":""} a cobrir — quem está livre`}
                      </div>
                      <div>
                        {coverSuggestions.slice(0, 12).map((day, i) => (
                          <div key={i} className="flex flex-wrap items-center justify-between gap-x-4 gap-y-0.5 text-xs py-1.5"
                            style={{ borderTop: i > 0 ? `1px solid ${T.upcomingDivider}` : "none" }}>
                            <div className="flex items-center gap-2">
                              <span className="font-mono font-bold" style={{ color:T.textSecondary }}>{fmtDate(day.date)}</span>
                              <span style={{ color:T.textMuted }}>{DOW_SHORT[day.dow]}</span>
                              <span style={{ color:T.periodColor }}>{day.shifts.map(s => s.period).join(" + ")}</span>
                              <span style={{ color:T.timeColor }}>{day.shifts.map(s => s.time).join(" / ")}</span>
                            </div>
                            {!subForm.substituto && (
                              <span style={{ color: day.available.length ? T.textSecondary : "#EF4444" }}>
                                {day.available.length ? `Livres: ${day.available.join(", ")}` : "⚠ Todos ocupados"}
                              </span>
                            )}
                          </div>
                        ))}
                        {coverSuggestions.length > 12 && (
                          <div className="text-xs mt-1" style={{ color:T.textMuted }}>… e mais {coverSuggestions.length - 12} dias</div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* ── PRÓXIMOS PLANTÕES ───────────────────────────── */}
            {filter && (
              <div className="rounded-2xl p-4 mb-5" style={{ background:T.upcomingBg, border:`1px solid ${T.upcomingBorder}` }}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="w-3 h-3 rounded-full" style={{ background: PEOPLE[filter].color }} />
                  <h2 className="font-bold text-base">Próximos sobreavisos de {filter}</h2>
                </div>
                {upcoming.length === 0 ? (
                  <div className="text-sm" style={{ color:T.textMuted }}>Nenhum plantão encontrado no período.</div>
                ) : (
                  <div>
                    {upcoming.map((u, i) => (
                      <div key={i} className="flex items-center justify-between py-2 text-sm gap-2 flex-wrap"
                        style={{ borderTop: i>0?`1px solid ${T.upcomingDivider}`:"none", opacity: u.coveredBy ? 0.5 : 1 }}>
                        <div className="flex items-center gap-3 flex-wrap">
                          <span className="font-mono font-bold w-14" style={{ color:T.textSecondary }}>{fmtDate(u.date)}</span>
                          <span className="w-10" style={{ color:T.textMuted }}>{DOW_SHORT[u.dow]}</span>
                          {u.kind === "folga" ? (
                            <span className="rounded-md px-2 py-0.5 text-xs font-bold" style={{ background:"#FEF9C3", color:"#854D0E" }}>🏖 Folga FDS</span>
                          ) : (
                            <span className="font-semibold" style={{ color: PEOPLE[filter].color }}>{u.period}</span>
                          )}
                          {u.coveringFor && (
                            <span className="text-[10px] font-bold rounded px-1.5 py-0.5" style={{ background:"#DBEAFE", color:"#1D4ED8" }}>
                              cobre {u.coveringFor}
                            </span>
                          )}
                          {u.coveredBy && (
                            <span className="text-[10px] font-bold rounded px-1.5 py-0.5" style={{ background:"#F3E5F5", color:"#7B1FA2" }}>
                              coberto por {u.coveredBy}
                            </span>
                          )}
                        </div>
                        <span className="font-mono text-xs" style={{ color:T.textMuted }}>{u.time}{u.dur?` · ${u.dur}`:""}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ── NAVEGAÇÃO DE MESES ──────────────────────────── */}
            <div className="flex gap-2 overflow-x-auto pb-2 mb-3" style={{ scrollbarWidth:"thin" }}>
              {months.map(m => (
                <button key={m.key} onClick={() => setMonthKey(m.key)} className="px-3 py-1.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all"
                  style={{ background:activeMonth===m.key?T.monthActiveBg:T.monthDefBg, color:activeMonth===m.key?T.monthActiveColor:T.monthDefColor, border:"1px solid "+(activeMonth===m.key?T.monthActiveBorder:T.monthDefBorder) }}>
                  {MONTHS_SHORT[m.m]}/{String(m.y).slice(2)}
                </button>
              ))}
            </div>

            {/* ── CALENDÁRIO ──────────────────────────────────── */}
            <h2 className="font-bold text-lg mb-3" style={{ color:T.textPrimary }}>{am?`${MONTHS[am.m]} de ${am.y}`:""}</h2>
            <div className="space-y-2">
              {monthDays.map(d => {
                const isToday   = sameDay(d.date, now);
                const isWeekend = d.dow === 0 || d.dow === 6;
                const isPast    = !isToday && d.date < now;
                const dk        = dayKey(d.date);

                const hasFiltered = !filter || d.shifts.some(s => {
                  const sub = getActiveSub(s.person, dk, subs);
                  return (sub ? sub.substituto : s.person) === filter || s.person === filter;
                }) || d.folga === filter;

                return (
                  <div key={dayKey(d.date)} className="rounded-xl overflow-hidden"
                    style={{ border:`${isToday?2:1}px solid ${isToday?T.cardBorderToday:T.cardBorder}`, opacity: isPast?0.45:filter&&!hasFiltered?0.35:1, background:isWeekend?T.cardBgWeekend:T.cardBg }}>
                    <div className="flex items-stretch">
                      <div className="flex flex-col items-center justify-center w-16 shrink-0 py-3"
                        style={{ background:isWeekend?T.dateColBgWeekend:T.dateColBg, borderRight:`1px solid ${T.dateColBorder}` }}>
                        <div className="text-[10px] font-bold uppercase tracking-wide" style={{ color:T.textMuted }}>{DOW_SHORT[d.dow]}</div>
                        <div className="text-xl font-bold leading-tight" style={{ color:T.dateNumColor }}>{String(d.date.getDate()).padStart(2,"0")}</div>
                        <div className="text-[10px]" style={{ color:T.monthShortColor }}>{MONTHS_SHORT[d.date.getMonth()]}</div>
                        {isToday && <div className="mt-1 text-[9px] font-bold text-white bg-slate-800 rounded px-1.5 py-0.5">HOJE</div>}
                      </div>
                      <div className="flex-1 px-3 py-2">
                        {isWeekend && d.dow === 6 && (
                          <div className="flex flex-wrap items-center gap-2 mb-1.5">
                            <span className="text-[10px] font-bold uppercase tracking-wider rounded px-1.5 py-0.5" style={{ background:T.cycleBg, color:T.cycleColor }}>
                              Semana {d.cycleWeek} do ciclo
                            </span>
                            <span className="text-[10px] font-bold rounded px-1.5 py-0.5" style={{ background:"#FEF9C3", color:"#854D0E", opacity: filter&&d.folga!==filter?0.4:1 }}>
                              🏖 Folga FDS: {d.folga}
                            </span>
                          </div>
                        )}
                        <div className="space-y-1">
                          {d.shifts.map((s, i) => {
                            const sub           = getActiveSub(s.person, dk, subs);
                            const effectivePerson = sub ? sub.substituto : s.person;
                            const dim           = !!(filter && effectivePerson !== filter && s.person !== filter);
                            return (
                              <div key={i} className="flex flex-wrap items-center gap-x-3 gap-y-0.5 text-sm" style={{ opacity: dim?0.3:1 }}>
                                <span className="w-24 font-semibold" style={{ color:T.periodColor }}>{s.period}</span>
                                <span className="font-mono text-xs w-28" style={{ color:T.timeColor }}>{s.time}</span>
                                <span className="font-mono text-xs w-7" style={{ color:T.durColor }}>{s.dur}</span>
                                <PersonTag name={effectivePerson} subOf={sub ? s.person : null} />
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="mt-6 text-center text-xs" style={{ color:T.textMuted }}>
              Ciclo de fim de semana ancorado em 13/06/2026 (Semana 1) · Escala seg–sex fixa · 5 semanas de rotação
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // APP ROOT — NAVEGAÇÃO POR ABAS + TEMA GLOBAL
    // ─────────────────────────────────────────────────────────────

    function App() {
      const [view, setView] = useState("escala");
      // Tema escuro como padrão; persiste no localStorage
      const [dark, setDark] = useState(loadDark);

      useEffect(() => {
        try { localStorage.setItem(LS_DARK, JSON.stringify(dark)); } catch {}
      }, [dark]);

      const toggleDark = () => setDark(d => !d);

      const navBg = dark ? "#020617" : "#1E293B";

      const tabStyle = (active) => ({
        background: active ? "rgba(255,255,255,0.15)" : "transparent",
        color: active ? "#fff" : "rgba(255,255,255,0.45)",
        border: "1px solid " + (active ? "rgba(255,255,255,0.25)" : "transparent"),
        borderRadius: "9999px",
        padding: "0.3rem 1rem",
        fontSize: "0.8rem",
        fontWeight: "700",
        cursor: "pointer",
        transition: "all 0.15s",
        letterSpacing: "0.02em",
      });

      return (
        <div>
          <div style={{ background: navBg, padding: "0.5rem 1rem", display: "flex", gap: "0.5rem", position: "sticky", top: 0, zIndex: 50, borderBottom: "1px solid rgba(255,255,255,0.06)", transition: "background 0.2s" }}>
            <button onClick={() => setView("escala")} style={tabStyle(view === "escala")}>
              📅 Escala
            </button>
            <button onClick={() => setView("controle")} style={tabStyle(view === "controle")}>
              ⏱ Controle de Horas
            </button>
          </div>
          {view === "escala"
            ? <EscalaSobreaviso dark={dark} onToggleDark={toggleDark} />
            : <ControleDeHoras dark={dark} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
